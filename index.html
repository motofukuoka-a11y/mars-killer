<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,viewport-fit=cover"
  >
  <meta name="theme-color" content="#075b91">
  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  >
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="default"
  >
  <meta
    name="apple-mobile-web-app-title"
    content="MARS KILLER"
  >
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./styles.css">
  <style>
    .update-notice,
    .startup-fallback {
      margin: 0 0 1rem;
      padding: 1rem;
      border: 1px solid currentColor;
      border-radius: .75rem;
    }

    .update-notice[hidden],
    .startup-fallback[hidden] {
      display: none;
    }

    .update-notice p,
    .startup-fallback p {
      margin: 0 0 .75rem;
    }

    .update-notice button,
    .startup-fallback button {
      min-height: 44px;
    }

    .update-notice[data-kind="error"],
    .startup-fallback {
      color: #9c1c1c;
    }
  </style>
  <style>
    .v5-options { margin:1rem 0; padding:1rem; border:1px solid currentColor; border-radius:1rem; }
    .v5-options summary { cursor:pointer; font-weight:700; }
    .v5-three,.v5-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:1rem; }
    .v5-checks { display:flex; flex-wrap:wrap; gap:1rem; margin-top:1rem; }
    .v5-card { display:flex; flex-direction:column; gap:.4rem; padding:1rem; border:1px solid currentColor; border-radius:1rem; }
    .v5-total { grid-column:span 2; }
    .history-row { display:grid; grid-template-columns:2fr 1fr 1fr; gap:1rem; padding:.75rem 0; border-bottom:1px solid currentColor; }
    details pre { max-height:32rem; overflow:auto; white-space:pre-wrap; word-break:break-word; }
    @media(max-width:760px){.v5-three,.v5-grid,.history-row{grid-template-columns:1fr}.v5-total{grid-column:auto}}
  </style>
  <title>MARS KILLER｜運賃・料金・払戻計算支援</title>
</head>

<body>
<main class="shell">
  <header class="app-header">
    <div class="brand-row">
      <div class="brand">
        <div class="logo">MK</div>
        <div>
          <h1>MARS KILLER</h1>
          <p class="subtitle">運賃・料金・払戻計算支援</p>
        </div>
      </div>

      <label class="theme-control" aria-label="表示設定">
        <span>表示</span>
        <select id="theme">
          <option value="system">端末</option>
          <option value="light">ライト</option>
          <option value="dark">ダーク</option>
        </select>
      </label>
    </div>

    <p id="status" class="status" aria-live="polite">起動中…</p>
  </header>

  <section
    id="updateNotice"
    class="update-notice"
    role="status"
    aria-live="polite"
    aria-atomic="true"
    hidden
  >
    <p id="updateMessage">
      新しいバージョンがあります。更新すると最新版へ切り替わります。
    </p>
    <button id="updateButton" type="button">
      更新する
    </button>
  </section>

  <section
    id="startupFallback"
    class="startup-fallback"
    role="alert"
    aria-live="assertive"
    hidden
  >
    <p>
      アプリの読込みに失敗した可能性があります。
    </p>
    <p>
      再読込みしても改善しない場合は、ブラウザのWebサイトデータを削除してください。
    </p>
    <button id="startupReload" type="button">
      再読込み
    </button>
  </section>

  <section class="card input-card">
    <label>
      計算内容
      <select id="operation">
        <option value="sale">発売額</option>
        <option value="refund">払戻額</option>
        <option value="business">営業実務</option>
      </select>
    </label>

    <div class="grid">
      <div class="station-field">
        <label>
          発駅
          <input id="start" value="札幌" autocomplete="off"
            inputmode="search" aria-autocomplete="list">
        </label>
        <div id="startCandidates" class="candidates" hidden></div>
      </div>

      <button id="swap" class="swap" aria-label="発着入替">⇄</button>

      <div class="station-field">
        <label>
          着駅
          <input id="goal" value="新千歳空港" autocomplete="off"
            inputmode="search" aria-autocomplete="list">
        </label>
        <div id="goalCandidates" class="candidates" hidden></div>
      </div>
    </div>

    <p class="input-help">ひらがな1文字から候補表示</p>

    <label>
      経由駅（任意）
      <input id="via" placeholder="複数はカンマ区切り">
    </label>

    <details class="v5-options" open>
      <summary>Version 5.0 実務検索条件</summary>
      <div class="two">
        <label>会社指定
          <select id="company">
            <option value="">自動判定</option>
            <option value="JRH">JR北海道</option>
          </select>
        </label>
        <label>列車種別
          <select id="trainType">
            <option value="">指定なし</option>
            <option value="local">普通・快速</option>
            <option value="liner">ライナー</option>
            <option value="express">急行</option>
            <option value="limited_express">特急</option>
            <option value="shinkansen">新幹線</option>
          </select>
        </label>
      </div>
      <div class="v5-three">
        <label>利用人数
          <input id="passengerCount" type="number" min="1" max="99" value="1">
        </label>
        <label>片道・往復
          <select id="tripType">
            <option value="one_way">片道</option>
            <option value="round_trip">往復</option>
          </select>
        </label>
        <label>設備
          <select id="seatClass">
            <option value="ordinary">普通車</option>
            <option value="unreserved">自由席</option>
            <option value="reserved">指定席</option>
            <option value="green">グリーン</option>
          </select>
        </label>
      </div>
      <div class="v5-checks">
        <label><input id="transfer" type="checkbox">乗継</label>
        <label><input id="sleeper" type="checkbox">寝台</label>
        <label><input id="debugMode" type="checkbox">デバッグモード</label>
      </div>
    </details>

    <div class="two">
      <label>
        旅客
        <select id="passenger">
          <option value="adult">大人</option>
          <option value="child">小児</option>
        </select>
      </label>
      <label>
        乗車日
        <input id="date" type="date" value="2026-07-18">
      </label>
    </div>

    <label>
      料金券
      <select id="charge">
        <option value="">なし</option>
        <option value="JRH_HOKKAIDO_SPECIAL_RESERVED">在来線特急指定席（道内特例）</option>
        <option value="JRH_A_EXPRESS_RESERVED">A特急指定席</option>
        <option value="JRH_A_EXPRESS_UNRESERVED">A特急自由席</option>
        <option value="JRH_ORDINARY_EXPRESS">急行料金</option>
        <option value="JRH_GREEN_EXPRESS">グリーン料金</option>
      </select>
    </label>

    <label>
      列車別料金
      <select id="product">
        <option value="">なし</option>
        <option value="AIRPORT_U_SEAT_PAPER">快速エアポート uシート</option>
        <option value="AIRPORT_U_SEAT_TICKETLESS">快速エアポート uシート チケットレス</option>
        <option value="AIRPORT_U_SEAT_300">uシート300円限定商品</option>
        <option value="SL_FUYU_SHITSUGEN">SL冬の湿原号</option>
        <option value="HOME_LINER_PAPER">ホームライナー</option>
      </select>
    </label>

    <label>
      割引（1名分）
      <select id="discount">
        <option value="">なし</option>
        <option value="STUDENT">学生割引</option>
        <option value="DISABILITY_TYPE1_SOLO">第1種・本人単独</option>
        <option value="DISABILITY_TYPE1_CAREGIVER">第1種・本人または介護者1名分</option>
        <option value="DISABILITY_TYPE2_SOLO">第2種・本人単独</option>
      </select>
    </label>

    <div id="refundOptions" hidden>
      <label>
        払戻対象
        <select id="refundTicketType">
          <option value="ordinary">普通乗車券</option>
          <option value="limited_express">特急券・指定席券・グリーン券等</option>
        </select>
      </label>
      <label>
        払戻し判定時点
        <select id="refundStatus"></select>
      </label>
      <div id="refundAfterTripFields" hidden>
        <label>
          未使用区間の払戻対象額
          <input id="unusedAmountYen" type="number" min="0" step="10"
            value="0" inputmode="numeric">
        </label>
        <label>
          未使用区間の営業キロ
          <input id="remainingBusinessKm" type="number" min="0" step="0.1"
            value="101" inputmode="decimal">
        </label>
        <p class="input-help">
          旅行開始後の普通乗車券は、未使用区間額と未使用区間営業キロを入力します。
        </p>
      </div>
    </div>

    <div id="businessOptions" hidden>
      <label>申出日<input id="requestDate" type="date"></label>
      <label>
        券種
        <select id="businessTicketType">
          <option value="ordinary">普通乗車券</option>
          <option value="limited_express">特急券</option>
          <option value="reserved_seat">指定席券</option>
          <option value="green">グリーン券</option>
        </select>
      </label>
      <fieldset>
        <legend>きっぷ利用形態</legend>
        <label><input type="radio" name="ticketUsageType"
          value="same_day" checked>当日のみ</label>
        <label><input type="radio" name="ticketUsageType"
          value="valid_period">有効期間あり</label>
      </fieldset>
      <div id="businessPeriodFields" hidden>
        <label>開始日<input id="ticketStartDate" type="date"></label>
        <label>終了日<input id="ticketEndDate" type="date"></label>
      </div>
      <fieldset>
        <legend>列車状態</legend>
        <label><input type="radio" name="departureStatus"
          value="before_departure" checked>出発前</label>
        <label><input type="radio" name="departureStatus"
          value="after_departure">出発後</label>
      </fieldset>
      <label>
        営業実務
        <select id="businessOperation">
          <option value="overrun">乗り越し</option>
          <option value="stop_calculation">打切計算</option>
          <option value="separate_calculation">別途計算</option>
          <option value="section_change">区間変更</option>
          <option value="route_change">経路変更</option>
          <option value="abandonment">前途放棄</option>
        </select>
      </label>
    </div>

    <button id="calc" class="primary" disabled>計算する</button>
  </section>

  <section id="result" class="card" hidden></section>

  <section class="card">
    <div class="brand-row">
      <h2>検索履歴</h2>
      <button id="clearHistory" type="button">履歴を消去</button>
    </div>
    <div id="historyList" aria-live="polite">
      <p>履歴はありません。</p>
    </div>
  </section>

  <p class="foot">
    非公式の計算支援ツールです。最終取扱いは規程・端末で確認してください。
  </p>
</main>

<script>
(() => {
  const fallback =
    document.getElementById(
      'startupFallback'
    );
  const status =
    document.getElementById('status');
  const reload =
    document.getElementById(
      'startupReload'
    );

  const timeoutId = window.setTimeout(
    () => {
      if (
        window
          .__MARS_KILLER_APP_STARTED__
      ) {
        return;
      }

      fallback.hidden = false;
      status.textContent =
        'アプリの読込みに失敗した可能性があります';
      status.className =
        'status error';
    },
    8000
  );

  const clearFallback = () => {
    window.clearTimeout(timeoutId);
    fallback.hidden = true;
  };

  window.addEventListener(
    'mars-killer-app-started',
    clearFallback,
    {
      once: true
    }
  );

  window.addEventListener(
    'mars-killer-app-ready',
    clearFallback,
    {
      once: true
    }
  );

  reload.addEventListener(
    'click',
    () => location.reload()
  );
})();
</script>
<script type="module" src="./app.js"></script>
</body>
</html>
